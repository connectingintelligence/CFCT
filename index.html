<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFCT Map — Locked</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body {
    background: linear-gradient(160deg, #0f172a 0%, #1e293b 60%, #334155 100%);
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    width: min(92vw, 420px);
    background: rgba(15, 23, 42, 0.72);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 18px;
    padding: 38px 34px 30px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
    text-align: center;
  }
  .lock {
    width: 56px; height: 56px; margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(148, 163, 184, 0.18);
    font-size: 26px;
  }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; color: #f8fafc; }
  .sub { margin: 0 0 24px; font-size: 13px; color: #94a3b8; line-height: 1.45; }
  input[type="password"] {
    width: 100%;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    background: rgba(15, 23, 42, 0.55);
    color: #f1f5f9;
    font-size: 15px;
    outline: none;
    transition: border-color .15s ease;
  }
  input[type="password"]:focus { border-color: #60a5fa; }
  button {
    margin-top: 14px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, transform .05s ease;
  }
  button:hover { background: #1d4ed8; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #475569; cursor: wait; }
  .err {
    margin-top: 14px;
    font-size: 13px;
    color: #fca5a5;
    min-height: 18px;
  }
  .foot {
    margin-top: 22px;
    font-size: 11px;
    color: #64748b;
    letter-spacing: 0.02em;
  }
  iframe#map-frame {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    border: 0;
    background: white;
  }
</style>
</head>

    <button id="unlock">Unlock</button>
    <div class="err" id="err"></div>

  const ITER = 250000;

  const b64ToBytes = b64 => {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);

  async function decrypt(password) {
    const raw = b64ToBytes(BLOB);
    const salt  = raw.slice(0, 16);
    const nonce = raw.slice(16, 28);
    const ct    = raw.slice(28);

    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
    return new TextDecoder().decode(pt);
  }

  async function tryUnlock() {

    btn.textContent = "Decrypting…";
    try {
      const html = await decrypt(pwInput.value || "");
      const iframe = document.createElement("iframe");
      iframe.id = "map-frame";
      iframe.sandbox = "allow-scripts allow-same-origin allow-popups allow-forms";
      iframe.srcdoc = html;
      document.body.innerHTML = "";
      document.body.appendChild(iframe);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "Unlock";
      err.textContent = "Wrong passphrase. Try again.";
      pwInput.select();
    }
  }

  btn.addEventListener("click", tryUnlock);
  pwInput.addEventListener("keydown", e => {
    if (e.key === "Enter") tryUnlock();
  });
})();
</script>
</body>
</html>
